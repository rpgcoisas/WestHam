<script>
// Seleciona todas as divs com a classe 'noticia'
const noticias = document.querySelectorAll('.noticia');
let indiceAtual = 0;

function alternarNoticia() {
  // Remove a classe da notícia que está aparecendo agora
  noticias[indiceAtual].classList.remove('ativa');

  // Calcula qual é a próxima notícia (volta ao zero se for a última)
  indiceAtual = (indiceAtual + 1) % noticias.length;

  // Adiciona a classe para exibir a nova notícia
  noticias[indiceAtual].classList.add('ativa');
}

// Configura o navegador para executar a função a cada 5 segundos
setInterval(alternarNoticia, 5000);

</script>
